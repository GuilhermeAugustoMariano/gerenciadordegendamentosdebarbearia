spring.h2.console.enabled=true

logging.level.com.guilhermeaugusto.gerenciadordegendamentosdebarbearia=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n